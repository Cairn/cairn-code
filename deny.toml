[advisories]
ignore = [
    # Unmaintained transitive dependencies of syntect 5.3.0 with no safe upgrade.
    "RUSTSEC-2024-0320",
    "RUSTSEC-2025-0141",
]

[licenses]
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "BSL-1.0",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
